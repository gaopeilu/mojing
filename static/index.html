<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨镜 MoJing | 智能写作分身</title>
    <style>
        :root {
            --bg: #030712;
            --surface: #111827;
            --border: #1f2937;
            --accent: #6366f1; /* Indigo Glow */
            --text-main: #f9fafb;
            --text-sub: #6b7280;
            --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: var(--font); background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* --- 登录页：极简科技风 --- */
        .auth-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 60%); z-index: 100; }
        .auth-box { width: 360px; text-align: center; }
        .logo-mark { font-size: 48px; margin-bottom: 24px; filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); }
        .brand-name { font-size: 20px; font-weight: 500; letter-spacing: 2px; color: #fff; margin-bottom: 8px; }
        .brand-tagline { font-size: 13px; color: var(--text-sub); margin-bottom: 40px; }
        
        .tech-input { width: 100%; padding: 14px 0; background: transparent; border: none; border-bottom: 1px solid var(--border); color: #fff; font-size: 15px; margin-bottom: 24px; transition: 0.3s; }
        .tech-input:focus { border-bottom-color: var(--accent); }
        .tech-input::placeholder { color: #374151; }
        
        .btn-glow { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .btn-glow:hover { background: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }

        /* --- 主应用：沉浸式工作台 --- */
        .app-layout { display: none; height: 100%; }
        .sidebar { width: 220px; background: var(--bg); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 10px 12px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-sub); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: #fff; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); }

        .main-stage { flex: 1; padding: 60px 80px; overflow-y: auto; position: relative; }
        .stage-header { position: absolute; top: 30px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--text-sub); }

        /* --- 写作核心区 --- */
        .input-zone { margin-top: 60px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .hero-input { width: 100%; background: transparent; border: none; color: #fff; font-size: 24px; font-weight: 500; line-height: 1.4; resize: none; min-height: 120px; }
        .hero-input::placeholder { color: #374151; }
        
        .action-bar { margin-top: 24px; display: flex; gap: 12px; align-items: center; opacity: 0; transition: 0.3s; }
        .input-zone:focus-within .action-bar { opacity: 1; }
        
        .chip { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; color: var(--text-sub); font-size: 13px; cursor: pointer; transition: 0.2s; }
        .chip:hover { border-color: var(--text-sub); color: #fff; }
        .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(99, 102, 241, 0.05); }

        /* --- 结果展示区 --- */
        .result-container { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 40px; animation: fadeUp 0.6s ease; }
        .doc-paper { background: #fff; color: #111; padding: 60px; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); line-height: 1.8; font-size: 16px; max-width: 800px; margin: 0 auto; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .section-view { display: none; height: 100%; }
        .section-view.active { display: block; }
    </style>
</head>
<body>

    <!-- 认证 -->
    <div id="authPage" class="auth-wrap">
        <div class="auth-box">
            <div class="logo-mark">🕶️</div>
            <div class="brand-name">墨 镜</div>
            <div class="brand-tagline">INTELLIGENT WRITING CLONE</div>
            <div id="loginForm">
                <input type="text" id="l_user" class="tech-input" placeholder="输入用户名">
                <input type="password" id="l_pass" class="tech-input" placeholder="输入密码">
                <button onclick="handleLogin()" class="btn-glow">激 活</button>
            </div>
            <div id="regForm" style="display:none;">
                <input type="text" id="r_user" class="tech-input" placeholder="设置用户名">
                <input type="password" id="r_pass" class="tech-input" placeholder="设置密码">
                <button onclick="handleRegister()" class="btn-glow">初 始 化</button>
            </div>
            <div style="margin-top: 24px; font-size: 12px; color: #4b5563; cursor: pointer;" onclick="toggleAuth()">
                <span id="authToggleText">新用户？初始化分身</span>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appPage" class="app-layout">
        <aside class="sidebar">
            <div style="font-weight: 700; letter-spacing: 2px; margin-bottom: 40px; padding-left: 12px;">墨 镜</div>
            <div class="nav-item active" onclick="switchTab('write')">写作核心</div>
            <div class="nav-item" onclick="switchTab('knowledge')">知识库 (RAG)</div>
            <div class="nav-item" onclick="switchTab('style')">克隆模式</div>
            <div class="nav-item" onclick="switchTab('history')">记忆日志</div>
            <div class="nav-item" onclick="handleLogout()" style="margin-top: auto; color: #ef4444;">断开连接</div>
        </aside>

        <main class="main-stage">
            <div class="stage-header">
                <div style="font-size: 14px; color: var(--text-sub);">当前任务：<span style="color: #fff;">未命名草稿</span></div>
                <div class="status-pill">系统在线</div>
            </div>

            <!-- 写作核心 -->
            <div id="tab-write" class="section-view active">
                <div class="input-zone">
                    <textarea id="writeQuery" class="hero-input" placeholder="请描述你的写作任务..."></textarea>
                    <div class="action-bar">
                        <div class="chip" id="styleChip" onclick="document.getElementById('styleSelect').click()">选择克隆模式 ▾</div>
                        <select id="styleSelect" style="display:none;" onchange="updateStyleChip(this)"></select>
                        <button onclick="startWriting()" class="btn-glow" style="width: auto; padding: 8px 24px; font-size: 13px;">生成大纲</button>
                    </div>
                </div>

                <div id="outlineSection" class="result-container" style="display:none;">
                    <div style="max-width: 800px; margin: 0 auto; margin-bottom: 20px; font-size: 13px; color: var(--text-sub);">大纲预览 // 支持手动微调</div>
                    <textarea id="outlineContent" class="hero-input" style="font-size: 16px; color: #d1d5db; border-bottom: 1px dashed var(--border);"></textarea>
                    <div class="action-bar" style="opacity: 1;">
                        <button onclick="generateFinal()" class="btn-glow" style="width: auto; padding: 8px 24px; font-size: 13px;">执行写作</button>
                    </div>
                </div>

                <div id="contentResult" class="result-container" style="display:none;">
                    <div class="doc-paper" id="finalDoc"></div>
                </div>
            </div>

            <!-- 其他模块 (保持极简列表风格) -->
            <div id="tab-style" class="section-view">
                <div style="max-width: 600px; margin: 80px auto;">
                    <h2 style="font-weight: 400; margin-bottom: 30px;">克隆模式库</h2>
                    <input type="file" id="styleFile" class="tech-input">
                    <button onclick="uploadStyle()" class="btn-glow" style="margin-top: 20px;">上传样本</button>
                    <div id="styleList" style="margin-top: 40px;"></div>
                </div>
            </div>
            
            <div id="tab-knowledge" class="section-view">
                <div style="max-width: 600px; margin: 80px auto;">
                    <h2 style="font-weight: 400; margin-bottom: 30px;">私有知识库</h2>
                    <input type="file" id="kbFile" class="tech-input">
                    <button onclick="uploadKnowledge()" class="btn-glow" style="margin-top: 20px;">上传资料</button>
                    <div id="kbList" style="margin-top: 40px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api/v1';
        let token = localStorage.getItem('token');

        function toggleAuth() {
            const login = document.getElementById('loginForm');
            const reg = document.getElementById('regForm');
            if(login.style.display === 'none') {
                login.style.display = 'block'; reg.style.display = 'none';
                document.getElementById('authToggleText').innerText = "New user? Initialize clone";
            } else {
                login.style.display = 'none'; reg.style.display = 'block';
                document.getElementById('authToggleText').innerText = "Existing user? Activate";
            }
        }

        async function handleLogin() {
            const u = document.getElementById('l_user').value;
            const p = document.getElementById('l_pass').value;
            const formData = new URLSearchParams();
            formData.append('username', u);
            formData.append('password', p);
            try {
                const res = await fetch(`${API}/auth/login`, { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: formData.toString() });
                if (!res.ok) throw new Error();
                const data = await res.json();
                token = data.access_token;
                localStorage.setItem('token', token);
                enterApp();
            } catch(e) { alert('激活失败，请检查网络或凭证。'); }
        }

        async function handleRegister() {
            const u = document.getElementById('r_user').value;
            const p = document.getElementById('r_pass').value;
            await fetch(`${API}/auth/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
            alert('分身初始化成功。请登录激活。');
            toggleAuth();
        }

        function handleLogout() { localStorage.removeItem('token'); location.reload(); }

        async function enterApp() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'flex';
            loadStyles();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.section-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
            if(tabName === 'style' || tabName === 'knowledge') loadLists(tabName);
        }

        function getHeaders() { return { 'Authorization': `Bearer ${token}` }; }

        // --- 核心写作逻辑 ---
        async function startWriting() {
            const query = document.getElementById('writeQuery').value;
            if(!query) return;
            const res = await fetch(`${API}/write/outline`, { method: 'POST', headers: {...getHeaders(), 'Content-Type': 'application/json'}, body: JSON.stringify({query}) });
            const data = await res.json();
            document.getElementById('outlineSection').style.display = 'block';
            document.getElementById('outlineContent').value = data.data.outline;
        }

        async function generateFinal() {
            const query = document.getElementById('writeQuery').value;
            const outline = document.getElementById('outlineContent').value;
            const styleId = document.getElementById('styleSelect').value;
            const payload = { query, outline };
            if(styleId) payload.style_id = parseInt(styleId);
            
            const res = await fetch(`${API}/write/generate`, { method: 'POST', headers: {...getHeaders(), 'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            document.getElementById('contentResult').style.display = 'block';
            document.getElementById('finalDoc').innerText = data.data.content;
        }

        // --- 风格管理 ---
        async function uploadStyle() {
            const file = document.getElementById('styleFile').files[0];
            if(!file) return;
            const formData = new FormData(); formData.append('file', file);
            await fetch(`${API}/style/upload`, { method: 'POST', headers: getHeaders(), body: formData });
            loadStyles();
        }

        async function loadStyles() {
            const res = await fetch(`${API}/style/list`, { headers: getHeaders() });
            const data = await res.json();
            const select = document.getElementById('styleSelect');
            const list = document.getElementById('styleList');
            select.innerHTML = ''; list.innerHTML = '';
            
            data.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.title}</option>`;
                list.innerHTML += `<div style="padding: 12px 0; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; font-size:13px;"><span>${s.title}</span><span style="color:var(--text-sub)">${s.style_description ? '已克隆' : '处理中'}</span></div>`;
            });
        }

        function updateStyleChip(select) {
            const chip = document.getElementById('styleChip');
            chip.innerText = select.options[select.selectedIndex].text;
            chip.classList.add('active');
        }

        if(token) enterApp();
    </script>
</body>
</html>
